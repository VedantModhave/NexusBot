version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-telegram-bot
    command: python -m src.integrations.telegram_bot
    env_file:
      - .env
    environment:
      NEXUSBOT_API_URL: http://api:8000/chat
    depends_on:
      - api
    restart: unless-stopped
